<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>AIDRAC Mobile Mission Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error-container": "#93000a",
                        "background": "#11131a",
                        "on-background": "#e2e2e9",
                        "primary-container": "#003ea8",
                        "on-surface": "#e2e2e9",
                        "on-secondary-fixed": "#341100",
                        "tertiary": "#ffb596",
                        "secondary-container": "#783200",
                        "secondary": "#ffb690",
                        "outline": "#8d909f",
                        "on-surface-variant": "#c3c6d7",
                        "on-primary-fixed": "#00174b",
                        "on-primary": "#002773",
                        "on-tertiary-fixed": "#360f00",
                        "surface-variant": "#434655",
                        "outline-variant": "#434655",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#11131a",
                        "tertiary-container": "#7d2d00",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-low": "#191b23",
                        "surface-container-high": "#282a32",
                        "secondary-fixed": "#ffdbca",
                        "primary": "#b4c5ff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "inverse-on-surface": "#11131a",
                        "secondary-fixed-dim": "#ffb690",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-primary": "#004ac6",
                        "error": "#ffb4ab",
                        "surface-bright": "#373941",
                        "on-tertiary-container": "#ffdbcd",
                        "on-secondary-fixed-variant": "#783200",
                        "on-secondary": "#5c2400",
                        "on-primary-container": "#dbe1ff",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-container-highest": "#33343d",
                        "inverse-surface": "#e2e2e9",
                        "tertiary-fixed": "#ffdbcd",
                        "surface": "#11131a",
                        "surface-container": "#1d1f27",
                        "on-tertiary": "#551d00",
                        "on-error": "#690005",
                        "surface-container-lowest": "#0c0e15",
                        "on-secondary-container": "#ffdbca",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-tint": "#b4c5ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "card-padding": "20px",
                        "container-padding": "32px",
                        "stack-lg": "24px",
                        "unit": "4px",
                        "stack-md": "16px"
                    },
                    fontFamily: {
                        "mono-label": ["JetBrains Mono"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "body-md": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-lg": ["Geist"]
                    },
                    fontSize: {
                        "mono-label": ["11px", { lineHeight: "14px", letterSpacing: "0.02em", fontWeight: "500" }],
                        "headline-md": ["20px", { lineHeight: "28px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "600" }],
                        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "32px", letterSpacing: "-0.02em", fontWeight: "600" }],

                        "body-lg": ["16px", { lineHeight: "24px", letterSpacing: "0em", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background h-screen w-full overflow-hidden flex flex-col relative font-body-md text-body-md antialiased md:hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-container-highest/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm flex justify-between items-center px-4 h-16 w-full text-primary dark:text-primary-fixed-dim">
<button class="hover:bg-surface-container-high transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary tracking-tight">AIDRAC</div>
<button class="hover:bg-surface-container-high transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</button>
</header>
<!-- Main Map Area (Mocked with Image/Background) -->
<main class="flex-1 w-full relative z-0 mt-16 pb-20">
<!-- Map Background -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="A highly detailed, futuristic top-down satellite map interface showing a city grid. The map is in a dark-mode color scheme with subtle blues and deep blacks, overlayed with high-tech glowing blue routing lines and semi-transparent red disaster zones. The aesthetic is corporate modern and precision-focused, resembling a high-stakes SaaS emergency dashboard." data-location="Tokyo" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCpVXVO_iLemyi5lMtX2aZhqL65b_f2sw32lTMqK876ooOSdk9RXbcqAYq93xacRuSI8kzc5u4i_EAEKqm3pdwMXG9wzhUndOQ7N2g1j0l9FvJG3m7ckC3hKht_GmFrhjLjNrj8cJ-DO8Q1CbROtvhkArkktXaAT8evYxtzYhX-0xK6ioAR_MQZkPdRNbojGhDV9-sEhZcoH7EToG70xh7ntKSYtAKzWOOfDbumf9IeYyxKvhR8BFV8sCbDLR1XAmDoh1qVTlMix3c')"></div>
<!-- Pulsing Disaster Zone -->
<div class="absolute top-1/3 left-1/4 w-32 h-32 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none">
<div class="absolute inset-0 rounded-full bg-error/20 pulse-ring"></div>
<div class="absolute inset-4 rounded-full bg-error/30 pulse-ring" style="animation-delay: 0.5s;"></div>
<div class="absolute inset-1/2 w-4 h-4 transform -translate-x-1/2 -translate-y-1/2 bg-error rounded-full shadow-[0_0_10px_rgba(255,180,171,0.8)]"></div>
</div>
<!-- User Location Marker & Route -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center pointer-events-none">
<div class="relative flex items-center justify-center w-8 h-8">
<div class="absolute inset-0 bg-primary/20 rounded-full pulse-ring"></div>
<div class="w-4 h-4 bg-primary rounded-full border-2 border-surface shadow-md"></div>
</div>
<!-- Mock Route Line SVG -->
<svg class="absolute top-4 left-4 w-48 h-48 pointer-events-none stroke-primary" style="stroke-width: 4px; stroke-dasharray: 8 4; fill: none; filter: drop-shadow(0 2px 4px rgba(180,197,255,0.3));">
<path d="M 0 0 C 40 40, 80 10, 120 80 S 150 120, 180 150"></path>
</svg>
</div>
<!-- Floating Action Buttons -->
<div class="absolute right-4 bottom-32 flex flex-col gap-stack-sm z-20">
<button aria-label="Emergency Mode" class="w-12 h-12 bg-error-container text-on-error-container rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">warning</span>
</button>
<div class="bg-surface rounded-full shadow-lg flex flex-col overflow-hidden border border-outline-variant/30">
<button aria-label="Zoom In" class="w-12 h-12 text-on-surface hover:bg-surface-container-high active:bg-surface-container transition-colors flex items-center justify-center border-b border-outline-variant/30">
<span class="material-symbols-outlined">add</span>
</button>
<button aria-label="Zoom Out" class="w-12 h-12 text-on-surface hover:bg-surface-container-high active:bg-surface-container transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button aria-label="Locate Me" class="w-12 h-12 bg-surface text-primary rounded-full shadow-lg flex items-center justify-center hover:bg-surface-container-high active:scale-95 transition-all border border-outline-variant/30 mt-stack-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
</div>
<!-- Bottom Sheet (Nearest Shelter) -->
<div class="absolute bottom-20 left-0 w-full px-4 pb-4 z-30 bottom-sheet">
<div class="bg-surface/90 backdrop-blur-xl border border-outline-variant/30 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.5)] overflow-hidden">
<div class="flex justify-center pt-3 pb-1">
<div class="w-12 h-1 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="p-card-padding pt-2">
<div class="flex justify-between items-start mb-stack-md">
<div>
<span class="inline-flex items-center gap-1 font-mono-label text-mono-label text-primary bg-primary/10 px-2 py-0.5 rounded-full mb-2 uppercase">
<span class="material-symbols-outlined text-[14px]">flag</span> Nearest Shelter
                            </span>
<h2 class="font-headline-md text-headline-md text-on-surface m-0">Community Hall A</h2>
</div>
<div class="bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center shadow-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
</div>
<div class="flex gap-gutter mb-stack-lg border-t border-outline-variant/20 pt-stack-sm">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-outline uppercase">Distance</span>
<span class="font-headline-md text-headline-md text-on-surface">1.4 <span class="text-body-md font-body-md text-on-surface-variant">km</span></span>
</div>
<div class="w-px bg-outline-variant/30 self-stretch"></div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-outline uppercase">Est. Time</span>
<span class="font-headline-md text-headline-md text-secondary-container">8 <span class="text-body-md font-body-md text-on-surface-variant">min</span></span>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md uppercase tracking-wider py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary/90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-[18px]">navigation</span> Start Navigation
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/80 dark:bg-surface-container-highest/80 backdrop-blur-xl border-t border-outline-variant/30 shadow-lg flex justify-around items-center w-full h-20 pb-safe px-2">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary active:scale-90 duration-200 font-label-md text-label-md w-16">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span>Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1.5 active:scale-90 duration-200 font-label-md text-label-md w-20">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">map</span>
<span>Map</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary active:scale-90 duration-200 font-label-md text-label-md w-16">
<span class="material-symbols-outlined mb-1">smart_toy</span>
<span class="whitespace-nowrap text-[10px]">AI Assistant</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary active:scale-90 duration-200 font-label-md text-label-md w-16">
<span class="material-symbols-outlined mb-1">notifications</span>
<span>Alerts</span>
</button>
</nav>
</body></html>
